name: Lead Scraper — Global Matrix

on:
  schedule:
    # Run automatically every Monday and Thursday at midnight
    - cron: "0 0 * * 1,4"
  workflow_dispatch:
    inputs:
      region:
        description: "Target Region (nigeria, uk, usa, canada, or all)"
        required: true
        default: "nigeria"
      sector:
        description: "Target Sector (dentists, roofing contractors, restaurants, saas, or all)"
        required: true
        default: "all"
      query:
        description: "Custom comma-separated query list (overrides region/sector if provided)"
        required: false
        default: ""
      limit:
        description: "Max number of leads to scrape per query"
        required: true
        default: "5"

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Scraper Dependencies
        run: |
          cd scraper
          npm install

      - name: Run Global Scraper Matrix
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          MAILBOXLAYER_API_KEY: ${{ secrets.MAILBOXLAYER_API_KEY }}
          REGION: ${{ github.event.inputs.region || 'nigeria' }}
          SECTOR: ${{ github.event.inputs.sector || 'all' }}
          QUERY: ${{ github.event.inputs.query || '' }}
          LIMIT: ${{ github.event.inputs.limit || '5' }}
        run: |
          cd scraper
          npm start
